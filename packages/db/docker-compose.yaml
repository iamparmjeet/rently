name: rently

services:
  postgres:
    image: postgres:16
    container_name: pg_db_local_rently
    restart: on-failure
    environment:
      POSTGRES_DB: rently_db
      POSTGRES_USER: rently_db_user
      POSTGRES_PASSWORD: rently_db_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rently_db_user"]
      interval: 30s
      timeout: 10s
      retries: 2

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
